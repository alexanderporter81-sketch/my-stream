<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStreams</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── TOKENS ── */
:root {
  --bg:        #0b0f16;
  --surf:      #131920;
  --surf2:     #1a2130;
  --surf3:     #212d3d;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.14);
  --accent:    #e63946;
  --accent-bg: rgba(230,57,70,0.14);
  --text:      #edf2f7;
  --muted:     #7a8899;
  --dim:       #3d4a58;
  /* Silk-safe font stack — Google Fonts load async but system stack
     is immediately available so there's no FOUT blank period */
  --ff-display: 'Bebas Neue', 'Arial Narrow', Arial, sans-serif;
  --ff-body:    'DM Sans', -apple-system, 'Segoe UI', Arial, sans-serif;
  --ff-mono:    'DM Mono', 'Courier New', monospace;
  /* Focus ring — thick, high-contrast for TV viewing distance */
  --focus-ring: 0 0 0 3px #fff, 0 0 0 5px var(--accent);
}

/* ── BASE ── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  min-height: 100vh;
  font-size: 16px;
  -webkit-tap-highlight-color: transparent;
}

/* ── GLOBAL FOCUS — critical for Fire TV remote navigation ── */
:focus { outline: none; }
:focus-visible { box-shadow: var(--focus-ring); border-radius: 6px; }
/* Fallback for Silk which may not support :focus-visible */
a:focus, button:focus, [tabindex]:focus {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}

/* ── HEADER ── */
header {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.8rem;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 20;
}

.logo {
  font-family: var(--ff-display);
  font-size: 1.75rem;
  letter-spacing: 3px;
  line-height: 1;
}
.logo em { color: var(--accent); font-style: normal; }

#clock {
  font-family: var(--ff-mono);
  font-size: 0.85rem;
  color: var(--muted);
}

/* ── PLAYER ── */
#player-wrap {
  display: none;
  background: var(--surf);
  border-bottom: 1px solid var(--border);
  padding: 1.25rem 1.8rem 1.6rem;
}

.player-meta {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: flex-start;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 1rem;
}

.live-tag {
  display: -webkit-inline-flex;
  display: inline-flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 5px;
  font-family: var(--ff-mono);
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  -webkit-animation: pulse 1.4s infinite;
  animation: pulse 1.4s infinite;
}

@-webkit-keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes pulse          { 0%,100%{opacity:1} 50%{opacity:.3} }

#active-title {
  font-family: var(--ff-display);
  font-size: 1.7rem;
  letter-spacing: 1px;
  line-height: 1.1;
}

.close-btn {
  background: transparent;
  border: 1.5px solid var(--border2);
  color: var(--muted);
  /* Minimum 48px touch target */
  padding: 0.6rem 1.1rem;
  border-radius: 7px;
  font-family: var(--ff-mono);
  font-size: 0.8rem;
  cursor: pointer;
  -webkit-transition: all .15s;
  transition: all .15s;
  min-height: 48px;
}
.close-btn:hover,
.close-btn:focus { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

/* iframe — no min() function, use padding-top % with max-height workaround */
.iframe-outer {
  width: 100%;
  max-width: 1000px;
}
.iframe-box {
  position: relative;
  width: 100%;
  /* 16:9 aspect ratio via padding hack — universally supported */
  padding-top: 56.25%;
  background: #000;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid var(--border);
  /* Silk: cap height without min() */
  max-height: 540px;
}
/* When padding-top would exceed 540px on wide screens, collapse it.
   We handle this in JS on load and resize. */
.iframe-box iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

.folder-row {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  gap: 8px;
  margin-top: 1rem;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
}
.folder-label {
  font-family: var(--ff-mono);
  font-size: 0.7rem;
  color: var(--dim);
}

.ftab {
  font-family: var(--ff-mono);
  font-size: 0.75rem;
  /* 44px min height for touch/remote */
  padding: 0.5rem 0.85rem;
  min-height: 44px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  -webkit-transition: all .12s;
  transition: all .12s;
}
.ftab.on  { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }
.ftab:hover, .ftab:focus { border-color: var(--border2); color: var(--text); background: var(--surf2); }
.ftab.on:hover, .ftab.on:focus { background: var(--accent-bg); color: var(--accent); }

/* ── FAVORITES SECTION ── */
.section {
  padding: 1.5rem 1.8rem;
}

.sec-head {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.2rem;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.sec-title {
  font-family: var(--ff-mono);
  font-size: 0.72rem;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.search-input {
  background: var(--surf);
  border: 1.5px solid var(--border);
  border-radius: 7px;
  padding: 0.5rem 0.9rem;
  min-height: 44px;
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 0.88rem;
  outline: none;
  width: 200px;
  -webkit-transition: border-color .15s;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::-webkit-input-placeholder { color: var(--dim); }
.search-input::placeholder { color: var(--dim); }

/* ── CHANNEL GRID ── */
.grid {
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 10px;
}

/* ── CHANNEL CARD ── */
.card {
  background: var(--surf);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  /* fixed width for Silk — flexbox wrapping is more reliable than CSS grid on Fire OS */
  width: 155px;
  min-height: 120px;
  padding: 1rem 0.75rem 0.75rem;
  cursor: pointer;
  -webkit-transition: border-color .15s, background .15s;
  transition: border-color .15s, background .15s;
  position: relative;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  gap: 0.5rem;
  text-align: center;
  -webkit-justify-content: center;
  justify-content: center;
  /* All interactive elements need explicit tabindex in JS */
  -webkit-user-select: none;
  user-select: none;
}

.card:hover,
.card:focus {
  border-color: rgba(255,255,255,0.25);
  background: var(--surf2);
}

.card.live {
  border-color: var(--accent);
  background: var(--accent-bg);
}

.logo-img {
  width: 46px;
  height: 46px;
  object-fit: contain;
  border-radius: 6px;
  background: var(--surf2);
  display: block;
}

.logo-fallback {
  width: 46px;
  height: 46px;
  border-radius: 6px;
  background: var(--surf3);
  display: none;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  font-family: var(--ff-mono);
  font-size: 0.58rem;
  color: var(--muted);
  padding: 4px;
  line-height: 1.3;
  text-align: center;
}

.ch-name {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
  max-width: 130px;
}

.ch-id {
  font-family: var(--ff-mono);
  font-size: 0.6rem;
  color: var(--dim);
}

/* Delete button — ALWAYS VISIBLE (small), not hover-gated.
   Fire TV has no hover so hover-only UI never appears. */
.del-btn {
  position: absolute;
  top: 6px;
  right: 6px;
  background: rgba(230,57,70,0.18);
  border: 1px solid rgba(230,57,70,0.3);
  color: var(--accent);
  /* 28px min for remote focusability */
  width: 28px;
  height: 28px;
  border-radius: 5px;
  font-size: 0.7rem;
  cursor: pointer;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  line-height: 1;
  -webkit-transition: background .1s;
  transition: background .1s;
  opacity: 0.55;
}
.del-btn:hover,
.del-btn:focus {
  background: rgba(230,57,70,0.4);
  opacity: 1;
}

.add-tile {
  background: transparent;
  border: 1.5px dashed var(--border2);
  border-radius: 10px;
  width: 155px;
  min-height: 120px;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  gap: 0.4rem;
  cursor: pointer;
  color: var(--dim);
  font-size: 0.8rem;
  font-family: var(--ff-body);
  -webkit-transition: all .15s;
  transition: all .15s;
}
.add-tile:hover,
.add-tile:focus {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-bg);
}
.add-tile .plus { font-size: 1.6rem; line-height: 1; }

/* ── MODAL — no backdrop-filter (unsupported on older Silk) ── */
.overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  /* Solid semi-transparent bg instead of blur — Silk compatible */
  background: rgba(5, 8, 14, 0.88);
  z-index: 50;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
}
.overlay.open {
  display: -webkit-flex;
  display: flex;
}

.modal {
  background: var(--surf);
  border: 1.5px solid var(--border2);
  border-radius: 12px;
  padding: 1.75rem;
  width: 460px;
  max-width: 95vw;
  max-height: 88vh;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
}

.modal-header {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.1rem;
}

.modal h2 {
  font-family: var(--ff-display);
  font-size: 1.4rem;
  letter-spacing: 1px;
}

.modal-close {
  background: var(--surf2);
  border: 1.5px solid var(--border2);
  color: var(--muted);
  width: 40px;
  height: 40px;
  border-radius: 7px;
  font-size: 1rem;
  cursor: pointer;
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  -webkit-transition: all .12s;
  transition: all .12s;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.modal-close:hover, .modal-close:focus { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

.modal-search-wrap {
  position: relative;
  margin-bottom: 0.85rem;
}

.modal-search {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border2);
  border-radius: 8px;
  padding: 0.7rem 0.9rem 0.7rem 2.5rem;
  min-height: 50px;
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 1rem;
  outline: none;
  -webkit-transition: border-color .15s;
  transition: border-color .15s;
  -webkit-appearance: none;
  appearance: none;
}
.modal-search:focus { border-color: var(--accent); }
.modal-search::-webkit-input-placeholder { color: var(--dim); }
.modal-search::placeholder { color: var(--dim); font-size: 0.9rem; }

.search-icon {
  position: absolute;
  left: 0.8rem;
  top: 50%;
  -webkit-transform: translateY(-50%);
  transform: translateY(-50%);
  color: var(--dim);
  font-size: 1rem;
  pointer-events: none;
}

.results-list {
  -webkit-flex: 1;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 220px;
  max-height: 340px;
  /* Silk smooth scroll */
  -webkit-overflow-scrolling: touch;
}

.results-list::-webkit-scrollbar { width: 5px; }
.results-list::-webkit-scrollbar-track { background: var(--surf2); }
.results-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 3px; }

.r-item {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  justify-content: space-between;
  /* 52px row = comfortable remote + touch target */
  padding: 0.7rem 0.9rem;
  min-height: 52px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  -webkit-transition: background .1s;
  transition: background .1s;
  gap: 10px;
}
.r-item:last-child { border-bottom: none; }
.r-item:hover, .r-item:focus { background: var(--surf2); outline: none; }
.r-item.already-added { opacity: 0.45; cursor: default; }

.r-info { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 2px; -webkit-flex: 1; flex: 1; min-width: 0; }
.r-name { font-size: 0.9rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.r-id   { font-family: var(--ff-mono); font-size: 0.65rem; color: var(--dim); }

.r-add {
  font-size: 0.75rem;
  font-family: var(--ff-mono);
  padding: 0.3rem 0.7rem;
  min-height: 36px;
  min-width: 64px;
  border-radius: 5px;
  border: 1.5px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  -webkit-transition: all .12s;
  transition: all .12s;
  -webkit-flex-shrink: 0;
  flex-shrink: 0;
}
.r-add:hover, .r-add:focus { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.r-add.added { border-color: var(--dim); color: var(--dim); cursor: default; background: transparent; }

.results-empty {
  display: -webkit-flex;
  display: flex;
  -webkit-align-items: center;
  align-items: center;
  -webkit-justify-content: center;
  justify-content: center;
  height: 100%;
  min-height: 120px;
  color: var(--dim);
  font-size: 0.82rem;
  font-family: var(--ff-mono);
  padding: 2rem;
  text-align: center;
  line-height: 1.6;
}

/* ── HELP BAR ── */
.help-bar {
  padding: 0.8rem 1.8rem;
  border-top: 1px solid var(--border);
  font-size: 0.72rem;
  color: var(--dim);
  font-family: var(--ff-mono);
  display: -webkit-flex;
  display: flex;
  gap: 1.5rem;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
}
.help-bar a { color: var(--muted); text-decoration: none; }
.help-bar a:hover, .help-bar a:focus { color: var(--accent); }

/* ── RESPONSIVE — Fire Tablet portrait ── */
@media (max-width: 600px) {
  .card, .add-tile { width: calc(50% - 5px); }
  .section { padding: 1rem; }
  header { padding: 0.8rem 1rem; }
  #player-wrap { padding: 1rem; }
}

/* ── DRAG & DROP ── */
.card[draggable="true"] { cursor: grab; }
.card.dragging {
  opacity: 0.35;
  cursor: grabbing;
  -webkit-transform: scale(0.97);
  transform: scale(0.97);
}
.card.drag-over {
  border-color: var(--accent);
  background: var(--accent-bg);
  -webkit-transform: scale(1.03);
  transform: scale(1.03);
}
.drag-handle {
  position: absolute;
  top: 6px;
  left: 6px;
  color: var(--dim);
  font-size: 0.75rem;
  line-height: 1;
  cursor: grab;
  padding: 2px 3px;
  border-radius: 3px;
  -webkit-transition: color .1s;
  transition: color .1s;
  -webkit-user-select: none;
  user-select: none;
}
.card:hover .drag-handle,
.card:focus .drag-handle { color: var(--muted); }
</style>
</head>
<body>

<header>
  <div class="logo">MY<em>STREAMS</em></div>
  <span id="clock" aria-live="off"></span>
</header>

<div id="player-wrap">
  <div class="player-meta">
    <div>
      <div class="live-tag"><span class="live-dot"></span>LIVE</div>
      <div id="active-title">—</div>
    </div>
    <button class="close-btn" id="close-btn" onclick="closePlayer()">✕ close</button>
  </div>
  <div class="iframe-outer">
    <div class="iframe-box" id="iframe-box">
      <iframe id="frame" src="" allowfullscreen
        allow="fullscreen; autoplay; encrypted-media; picture-in-picture"
        sandbox="allow-scripts allow-same-origin allow-presentation allow-forms allow-popups"></iframe>
    </div>
  </div>
  <div class="folder-row">
    <span class="folder-label">folder:</span>
    <button class="ftab on" data-f="stream"  onclick="switchFolder(this)">stream</button>
    <button class="ftab"    data-f="cast"    onclick="switchFolder(this)">cast</button>
    <button class="ftab"    data-f="watch"   onclick="switchFolder(this)">watch</button>
    <button class="ftab"    data-f="plus"    onclick="switchFolder(this)">plus</button>
    <button class="ftab"    data-f="casting" onclick="switchFolder(this)">casting</button>
    <button class="ftab"    data-f="player"  onclick="switchFolder(this)">player</button>
  </div>
</div>

<div class="section">
  <div class="sec-head">
    <span class="sec-title">Favorites</span>
    <input class="search-input" id="search" type="text"
      placeholder="filter favorites..."
      oninput="renderFavorites(this.value)"
      aria-label="Filter favorites">
  </div>
  <div class="grid" id="grid" role="list" aria-label="Favorite channels"></div>
</div>

<!-- ADD MODAL -->
<div class="overlay" id="modal" role="dialog" aria-modal="true" aria-label="Add channel">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Channel</h2>
      <button class="modal-close" id="modal-close-btn" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-search-wrap">
      <span class="search-icon" aria-hidden="true">⌕</span>
      <input class="modal-search" id="modal-search" type="text"
        placeholder="ESPN, NBA, NFL, soccer, beIN, UK..."
        oninput="updateResults(this.value)"
        autocomplete="off" spellcheck="false"
        aria-label="Search channels" aria-controls="results-list">
    </div>
    <div class="results-list" id="results-list" role="list" tabindex="-1">
      <div class="results-empty">Start typing to search 900+ channels</div>
    </div>
  </div>
</div>

<div class="help-bar">
  <span>If a stream won't load, try a different folder above the player.</span>
  <a href="https://dlhd.pk/24-7-channels.php" target="_blank">Full channel list →</a>
  <a href="https://dlhd.pk/" target="_blank">Live schedule →</a>
</div>

/* ── STORAGE ── */
function load() {
  try { return JSON.parse(localStorage.getItem('ms_ch')) || DEFAULTS; }
  catch(e) { return DEFAULTS; }
}
function save(arr) {
  try { localStorage.setItem('ms_ch', JSON.stringify(arr)); }
  catch(e) {}
}

/* ── DRAG STATE ── */
var dragSrc = null;
var touchDragSrc = null;
var touchDragDest = null;
var touchTimer = null;
var isTouchDragging = false;

function reorder(srcId, destId) {
  var arr = load();
  var si = arr.findIndex(function(c) { return c.id === srcId; });
  var di = arr.findIndex(function(c) { return c.id === destId; });
  if (si === -1 || di === -1) return;
  var item = arr.splice(si, 1)[0];
  arr.splice(di, 0, item);
  save(arr);
  renderFavorites(document.getElementById('search').value);
}

/* ── IFRAME HEIGHT FIX (no CSS min() support) ── */
function fixIframeHeight() {
  var box = document.getElementById('iframe-box');
  if (!box) return;
  var w = box.offsetWidth;
  var h = w * 0.5625;
  if (h > 540) {
    box.style.paddingTop = '0';
    box.style.height = '540px';
  } else {
    box.style.paddingTop = '56.25%';
    box.style.height = '';
  }
}
window.addEventListener('resize', fixIframeHeight);

/* ── LOGO PATH ── */
function logoPath(name) {
  return BASE + '/logos/' + name.toLowerCase()
    .replace(/&/g,'and').replace(/\s+/g,'_')
    .replace(/[^a-z0-9_]/g,'') + '.png';
}

/* ── RENDER FAVORITES ── */
function renderFavorites(filter) {
  filter = filter || '';
  var grid = document.getElementById('grid');
  var channels = load();
  grid.innerHTML = '';
  var q = filter.toLowerCase();
  var visible = channels.filter(function(ch) {
    return !q || ch.name.toLowerCase().indexOf(q) !== -1;
  });

  visible.forEach(function(ch, i) {
    var card = makeCard(ch, i);
    grid.appendChild(card);
  });

  if (!q) {
    var add = document.createElement('div');
    add.className = 'add-tile';
    add.setAttribute('tabindex', '0');
    add.setAttribute('role', 'button');
    add.setAttribute('aria-label', 'Add channel');
    add.innerHTML = '<div class="plus">+</div><div>Add channel</div>';
    add.onclick = openModal;
    add.onkeydown = function(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(); } };
    grid.appendChild(add);
  }

  // Arrow-key grid navigation setup
  setupGridNav();
}

function makeCard(ch) {
  var card = document.createElement('div');
  card.className = 'card' + (ch.id === activeId ? ' live' : '');
  card.setAttribute('tabindex', '0');
  card.setAttribute('role', 'listitem');
  card.setAttribute('aria-label', ch.name + ', channel ' + ch.id);
  card.setAttribute('draggable', 'true');
  card.dataset.id = ch.id;

  var imgSrc = logoPath(ch.name);
  card.innerHTML =
    '<div class="drag-handle" aria-hidden="true" title="Drag to reorder">:::</div>' +
    '<img class="logo-img" src="' + imgSrc + '" alt="" ' +
      'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
    '<div class="logo-fallback">' + ch.name.slice(0,8) + '</div>' +
    '<div class="ch-name">' + escHtml(ch.name) + '</div>' +
    '<div class="ch-id">#' + ch.id + '</div>' +
    '<button class="del-btn" aria-label="Remove ' + escHtml(ch.name) + '" tabindex="0">✕</button>';

  card.querySelector('.del-btn').onclick = function(e) {
    e.stopPropagation();
    removeChannel(ch.id);
  };

  card.onclick = function(e) {
    if (e.target.classList.contains('del-btn')) return;
    if (e.target.classList.contains('drag-handle')) return;
    play(ch.id, ch.name, card);
  };

  card.onkeydown = function(e) {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      play(ch.id, ch.name, card);
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      e.preventDefault();
      removeChannel(ch.id);
    }
    handleGridArrow(e);
  };

  /* ── MOUSE DRAG ── */
  card.addEventListener('dragstart', function(e) {
    dragSrc = ch.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', ch.id);
  });
  card.addEventListener('dragend', function() {
    card.classList.remove('dragging');
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
  });
  card.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    if (ch.id !== dragSrc) card.classList.add('drag-over');
  });
  card.addEventListener('dragleave', function() {
    card.classList.remove('drag-over');
  });
  card.addEventListener('drop', function(e) {
    e.preventDefault();
    card.classList.remove('drag-over');
    if (dragSrc && dragSrc !== ch.id) reorder(dragSrc, ch.id);
  });

  /* ── TOUCH DRAG (Fire Tablet) ── */
  card.addEventListener('touchstart', function(e) {
    touchDragSrc = ch.id;
    touchTimer = setTimeout(function() {
      card.classList.add('dragging');
      isTouchDragging = true;
    }, 300);
  }, {passive: true});

  card.addEventListener('touchmove', function(e) {
    if (!isTouchDragging) return;
    e.preventDefault();
    var touch = e.touches[0];
    var el = document.elementFromPoint(touch.clientX, touch.clientY);
    var target = el ? el.closest('.card') : null;
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
    if (target && target.dataset.id && target.dataset.id !== touchDragSrc) {
      target.classList.add('drag-over');
      touchDragDest = target.dataset.id;
    }
  }, {passive: false});

  card.addEventListener('touchend', function() {
    clearTimeout(touchTimer);
    card.classList.remove('dragging');
    document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
    if (isTouchDragging && touchDragDest && touchDragDest !== touchDragSrc) {
      reorder(touchDragSrc, touchDragDest);
    }
    isTouchDragging = false;
    touchDragSrc = null;
    touchDragDest = null;
  });

  return card;
}

/* ── ARROW-KEY GRID NAVIGATION ── */
function setupGridNav() {
  // Cards are laid out in a flex-wrap grid; we compute cols by checking
  // when the Y offset changes — works without CSS grid queries.
}

function handleGridArrow(e) {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.key) === -1) return;
  e.preventDefault();

  var grid = document.getElementById('grid');
  var items = Array.prototype.slice.call(
    grid.querySelectorAll('.card, .add-tile')
  );
  var cur = document.activeElement;
  var idx = items.indexOf(cur);
  if (idx === -1) return;

  // Determine columns by checking offsetTop changes
  var cols = 1;
  var baseTop = items[0] ? items[0].offsetTop : 0;
  for (var i = 1; i < items.length; i++) {
    if (items[i].offsetTop !== baseTop) { cols = i; break; }
  }
  if (cols === 1) cols = items.length; // all on one row

  var next = idx;
  if (e.key === 'ArrowRight') next = idx + 1;
  if (e.key === 'ArrowLeft')  next = idx - 1;
  if (e.key === 'ArrowDown')  next = idx + cols;
  if (e.key === 'ArrowUp')    next = idx - cols;

  next = Math.max(0, Math.min(next, items.length - 1));
  items[next].focus();
}

/* ── PLAY ── */
function play(id, name, card) {
  activeId = id;
  document.getElementById('active-title').textContent = name;
  document.getElementById('frame').src = BASE + '/' + folder + '/stream-' + id + '.php';
  var pw = document.getElementById('player-wrap');
  pw.style.display = 'block';
  fixIframeHeight();
  // Scroll to top then focus close button for remote usability
  pw.scrollIntoView({behavior:'smooth', block:'start'});
  setTimeout(function() {
    document.getElementById('close-btn').focus();
  }, 400);
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('live'); });
  if (card) card.classList.add('live');
}

/* ── CLOSE PLAYER ── */
function closePlayer() {
  document.getElementById('frame').src = '';
  document.getElementById('player-wrap').style.display = 'none';
  activeId = null;
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('live'); });
}

/* ── SWITCH FOLDER ── */
function switchFolder(btn) {
  folder = btn.dataset.f;
  document.querySelectorAll('.ftab').forEach(function(b) { b.classList.remove('on'); });
  btn.classList.add('on');
  if (activeId) {
    document.getElementById('frame').src = BASE + '/' + folder + '/stream-' + activeId + '.php';
  }
}

/* ── REMOVE CHANNEL ── */
function removeChannel(id) {
  save(load().filter(function(c) { return c.id !== id; }));
  if (activeId === id) closePlayer();
  renderFavorites(document.getElementById('search').value);
}

/* ── CHANNEL SEARCH / ADD ── */
function isAdded(id) {
  return load().some(function(c) { return c.id === id; });
}

function addChannel(id, name) {
  if (isAdded(id)) return;
  var arr = load();
  arr.push({id: id, name: name});
  save(arr);
  renderFavorites();
  updateResults(document.getElementById('modal-search').value);
}

function updateResults(q) {
  var list = document.getElementById('results-list');
  q = (q || '').trim();

  if (!q) {
    list.innerHTML = '<div class="results-empty">Start typing to search 900+ channels</div>';
    return;
  }

  var terms = q.toLowerCase().split(/\s+/);
  var matches = CATALOG.filter(function(ch) {
    var n = ch.name.toLowerCase();
    return terms.every(function(t) { return n.indexOf(t) !== -1; });
  }).slice(0, 60);

  if (!matches.length) {
    list.innerHTML = '<div class="results-empty">No channels matching "' + escHtml(q) + '"</div>';
    return;
  }

  list.innerHTML = matches.map(function(ch) {
    var added = isAdded(ch.id);
    var safeName = ch.name.replace(/'/g, "\\'");
    return '<div class="r-item' + (added ? ' already-added' : '') + '"' +
      ' tabindex="0" role="listitem"' +
      (added ? '' : ' onclick="addChannel(\'' + ch.id + '\',\'' + safeName + '\')"') +
      ' onkeydown="rItemKey(event,\'' + ch.id + '\',\'' + safeName + '\')">' +
      '<div class="r-info">' +
        '<div class="r-name">' + escHtml(ch.name) + '</div>' +
        '<div class="r-id">#' + ch.id + '</div>' +
      '</div>' +
      '<button class="r-add' + (added ? ' added' : '') + '"' +
        (added ? ' disabled' : ' onclick="event.stopPropagation();addChannel(\'' + ch.id + '\',\'' + safeName + '\')"') +
        ' tabindex="-1">' +
        (added ? '✓ added' : '+ add') +
      '</button></div>';
  }).join('');
}

function rItemKey(e, id, name) {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    addChannel(id, name);
  }
  // Arrow up/down within results list
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    var items = Array.prototype.slice.call(
      document.querySelectorAll('#results-list .r-item')
    );
    var idx = items.indexOf(e.currentTarget);
    var next = e.key === 'ArrowDown' ? idx + 1 : idx - 1;
    next = Math.max(0, Math.min(next, items.length - 1));
    items[next].focus();
  }
}

/* ── MODAL ── */
var _focusBeforeModal = null;

function openModal() {
  _focusBeforeModal = document.activeElement;
  document.getElementById('modal').classList.add('open');
  setTimeout(function() {
    document.getElementById('modal-search').focus();
  }, 60);
  // Focus trap
  document.getElementById('modal').addEventListener('keydown', trapFocus);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.getElementById('modal-search').value = '';
  document.getElementById('results-list').innerHTML =
    '<div class="results-empty">Start typing to search 900+ channels</div>';
  document.getElementById('modal').removeEventListener('keydown', trapFocus);
  if (_focusBeforeModal) _focusBeforeModal.focus();
}

function trapFocus(e) {
  if (e.key !== 'Tab') return;
  var focusable = Array.prototype.slice.call(
    document.querySelectorAll('#modal input, #modal button, #modal [tabindex="0"]')
  );
  var first = focusable[0];
  var last  = focusable[focusable.length - 1];
  if (e.shiftKey && document.activeElement === first) {
    e.preventDefault(); last.focus();
  } else if (!e.shiftKey && document.activeElement === last) {
    e.preventDefault(); first.focus();
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && document.getElementById('modal').classList.contains('open')) {
    closeModal();
  }
});

/* ── HTML ESCAPE ── */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── CLOCK ── */
(function tick() {
  var el = document.getElementById('clock');
  if (el) el.textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setTimeout(tick, 1000);
})();

/* ── INIT ── */
fixIframeHeight();
renderFavorites();
</script>
